<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOTREAL - Master Admin</title>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100..800&family=Syne:wght@400..800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --accent: #ffffff;
            --text: #888;
        }

        body {
            background: var(--bg);
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
            margin: 0;
            overflow-x: hidden;
        }

        /* LOGIN SCREEN */
        #login-screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #login-screen.hidden {
            display: none;
        }

        .login-box {
            text-align: center;
        }

        input[type="password"],
        input[type="text"],
        textarea,
        select {
            background: #111;
            border: 1px solid #333;
            color: #fff;
            padding: 1rem;
            width: 100%;
            font-family: inherit;
            margin-bottom: 1rem;
            box-sizing: border-box;
        }

        button {
            background: #fff;
            color: #000;
            border: none;
            padding: 1rem 2rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        button:hover {
            background: #333;
            color: #fff;
        }

        #login-error {
            color: #ff3333;
            margin-top: 1rem;
            display: none;
        }

        /* DASHBOARD */
        #dashboard-screen {
            display: none;
            height: 100vh;
        }

        #dashboard-screen.active {
            display: flex;
        }

        .sidebar {
            width: 300px;
            background: #111;
            border-right: 1px solid #333;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 2rem;
            border-bottom: 1px solid #333;
        }

        .project-item {
            padding: 1rem 2rem;
            cursor: pointer;
            border-bottom: 1px solid #222;
            transition: 0.2s;
            color: var(--text);
        }

        .project-item:hover,
        .project-item.active {
            background: #222;
            color: #fff;
        }

        .main-panel {
            flex: 1;
            padding: 3rem;
            overflow-y: auto;
        }

        .form-group {
            margin-bottom: 2rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text);
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #333;
        }

        .btn-save {
            background: #00ff00;
            color: #000;
        }

        .btn-save:hover {
            background: #00cc00;
        }
    </style>
</head>

<body>

    <div id="login-screen">
        <div class="login-box">
            <h1 style="font-family: 'Syne', sans-serif; font-size: 3rem; margin-bottom: 2rem;">SYSTEM OVERRIDE</h1>
            <input type="password" id="admin-pass" placeholder="ENTER MASTER KEY" autofocus>
            <button id="btn-login">ACCESS</button>
            <div id="login-error">ACCESS DENIED.</div>
        </div>
    </div>

    <div id="dashboard-screen">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2 style="font-family: 'Syne', sans-serif; margin: 0;">PROJECTS</h2>
                <p style="color: var(--text); font-size: 0.8rem; margin-top: 0.5rem;">Select a file to enrich</p>
            </div>
            <div id="project-list">
            </div>
        </div>

        <div class="main-panel">
            <div class="top-bar">
                <div>
                    <h2 id="current-edit-title" style="margin: 0; font-family: 'Syne', sans-serif;">NO PROJECT SELECTED
                    </h2>
                    <p id="current-edit-id" style="color: var(--text); margin-top: 0.5rem;">---</p>
                </div>
                <div>
                    <button class="btn-save" id="btn-download-json">💾 OVERWRITE JSON</button>
                    <button id="btn-logout" style="margin-left: 1rem; background: #333; color: white;">LOGOUT</button>
                </div>
            </div>

            <form id="edit-form" style="display: none; max-width: 800px;">
                <div class="form-group">
                    <label>Titre d'affichage (Display Title)</label>
                    <input type="text" id="input-title" placeholder="Ex: Slalom - Not Just A Club">
                </div>

                <div class="form-group">
                    <label>Catégorie (Override Python Category if needed)</label>
                    <input type="text" id="input-category" placeholder="Ex: Publicité">
                </div>

                <div class="form-group">
                    <label>Synopsis / Description</label>
                    <textarea id="input-synopsis" rows="5" placeholder="Décrivez le projet ici..."></textarea>
                </div>

                <div class="form-group">
                    <label>Crédits (HTML autorisé, ex: Director: GOTREAL<br>DOP: ...)</label>
                    <textarea id="input-credits" rows="4" placeholder="Director: GOTREAL&#10;Client: Nike"></textarea>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/admin.js"></script>
</body>

</html>
