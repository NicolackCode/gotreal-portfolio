<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{PROJECT_TITLE}} - GOTREAL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100..800&family=Syne:wght@400..800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css?v=5">
    <style>
        .project-gallery {
            display: flex;
            gap: 1.5rem;
            margin-top: 2rem;
            padding-bottom: 2rem;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .project-gallery::-webkit-scrollbar { display: none; }

        .gallery-item {
            flex: 0 0 160px;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1), filter 0.4s;
            position: relative;
            filter: grayscale(0.8) brightness(0.6);
        }
        .gallery-item:hover, .gallery-item.active {
            transform: scale(1.05) translateY(-5px);
            filter: grayscale(0) brightness(1);
        }
        .gallery-item video {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .gallery-item span {
            display: block;
            margin-top: 0.5rem;
            font-family: var(--font-ui);
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-align: center;
            color: rgba(255,255,255,0.5);
        }
        .gallery-item.active span {
            color: var(--accent-cyan, #00f2ff);
            font-weight: 700;
        }
    </style>
</head>

<body data-barba="wrapper">

    <div class="preloader" id="preloader">
        <div class="mesh-gradient">
            <div class="mesh-blob mesh-1"></div>
            <div class="mesh-blob mesh-2"></div>
            <div class="mesh-blob mesh-3"></div>
        </div>
        <div class="preloader-content">
            <span class="preloader-text">GOTREAL</span>
            <div class="preloader-progress"><span id="preloader-percent">0</span>%</div>
        </div>
    </div>

    <header class="camera-frame-top">
        <div class="logo-container">
            <a href="/index.html" class="brand-link">GOTREAL</a>
            <span class="subtitle">REALISATEUR &amp; CHEF OP.<br>PUBLICITES, CLIPS MUSICAUX ET FILMS.</span>
        </div>
        <nav class="main-nav">
            <a href="/about.html" class="nav-btn">À PROPOS</a>
            <a href="/all-projects.html" class="nav-btn" id="btn-projects">TOUS LES PROJETS</a>
            <a href="mailto:gotrealisation@gmail.com?subject=Nouveau%20projet%20-%20Contact%20Portfolio&body=Bonjour%20Gauthier%2C%0D%0A%0D%0AJe%20vous%20contacte%20pour%20vous%20parler%20d'un%20projet...%0D%0A%0D%0A%5BVotre%20message%20ici%5D%0D%0A%0D%0AMes%20coordonn%C3%A9es%20%3A%0D%0ANom%20%3A%0D%0AT%C3%A9l%C3%A9phone%20%3A" class="nav-btn">CONTACT</a>
        </nav>
    </header>

    <main class="project-container" id="main-container" data-barba="container" data-barba-namespace="project">
        <div class="video-wrapper is-expanded" id="main-video-wrapper">

            <!-- Ambilight -->
            <canvas id="ambilight-canvas" aria-hidden="true"></canvas>

            <div class="slider-container" id="slider-container">
                <video class="main-video slide-video" id="video-current" src="{{VIDEO_SRC}}" autoplay loop muted
                    playsinline></video>
            </div>

            <div class="video-immersive-ui" id="immersive-ui" style="opacity:1;">
                <div class="video-header">
                    <div class="title-wrapper">
                        <h2 class="video-title" id="title-current">{{PROJECT_TITLE}}</h2>
                    </div>
                </div>
                <div class="video-footer">
                    <div class="timeline" id="timeline">
                        <div class="timeline-progress" id="timeline-progress" style="width:0%;"></div>
                    </div>
                    <div class="video-controls">
                        <button class="control-btn play-pause-btn" id="btn-pause">PAUSE</button>
                        <div class="sound-wrapper">
                            <button class="control-btn sound-btn" id="btn-sound">SON: OFF</button>
                            <input type="range" class="volume-slider immersive-volume" id="volume-immersive" min="0"
                                max="1" step="0.01" value="1">
                        </div>
                        <button class="control-btn" id="btn-fullscreen">PLEIN ECRAN</button>
                        <div id="ambilight-switcher" class="amb-dropdown-container">
                            <span class="amb-label">AMBILIGHT</span>
                            <div class="amb-dropdown">
                                <button class="amb-btn amb-active" data-mode="0">HALO</button>
                                <button class="amb-btn" data-mode="1">FLUX</button>
                                <button class="amb-btn" data-mode="2">NÉON</button>
                            </div>
                        </div>
                    </div>
                </div>
                <span class="video-role" id="role-main">{{PROJECT_ROLE}}</span>
            </div>
        </div>

        <!-- Infos projet (hors video-wrapper pour le scroll) -->
        <section class="project-details" id="project-details" style="display:block;">
            <div class="project-info-grid">
                <div class="col synopsis">
                    <h3>SYNOPSIS</h3>
                    <p>{{PROJECT_SYNOPSIS}}</p>
                </div>
                <div class="col credits">
                    <h3>CREDITS</h3>
                    <ul id="project-credits-list">
                        {{PROJECT_CREDITS}}
                    </ul>
                </div>
            </div>

            <!-- Galerie Visuelle (Carousel bas) -->
            <div class="project-gallery" id="project-gallery"></div>
        </section>
    </main>

    <footer class="camera-frame-bottom" style="opacity:0; pointer-events:none;"></footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Observer.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Flip.min.js"></script>
    <script src="https://unpkg.com/@barba/core"></script>
    <script src="https://unpkg.com/lenis@1.1.20/dist/lenis.min.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/preloader.js"></script>
    <script src="/js/animations.js"></script>
    <script src="/js/ambilight.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/transitions.js"></script>
</body>

</html>
